name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_APP_NAME: hockeypong
  NODE_VERSION: '20'

jobs:
  infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    outputs:
      acr-name: ${{ steps.deploy-bicep.outputs.acrName }}
      acr-login-server: ${{ steps.deploy-bicep.outputs.acrLoginServer }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # NOTE: You need to configure these GitHub secrets:
      # - AZURE_CREDENTIALS: Service principal JSON from:
      #   az ad sp create-for-rbac --name "hockeypong-deploy" \
      #     --role contributor \
      #     --scopes /subscriptions/{subscription-id}/resourceGroups/{resource-group} \
      #     --sdk-auth
      # - AZURE_SUBSCRIPTION_ID: Your Azure subscription ID
      # - AZURE_RG: Resource group name (e.g., "hockeypong-rg")

      - name: Create Resource Group
        run: |
          az group create \
            --name ${{ secrets.AZURE_RG }} \
            --location eastus2 \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: deploy-bicep
        run: |
          output=$(az deployment group create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters appName=${{ env.AZURE_APP_NAME }} \
            --query 'properties.outputs' \
            --output json)

          acrName=$(echo $output | jq -r '.acrName.value')
          acrLoginServer=$(echo $output | jq -r '.acrLoginServer.value')
          containerFqdn=$(echo $output | jq -r '.containerFqdn.value')

          echo "acrName=$acrName" >> $GITHUB_OUTPUT
          echo "acrLoginServer=$acrLoginServer" >> $GITHUB_OUTPUT
          echo "containerFqdn=$containerFqdn" >> $GITHUB_OUTPUT
          echo "✅ Infrastructure deployed — ACR: $acrLoginServer"

  deploy:
    name: Build & Deploy Container
    runs-on: ubuntu-latest
    needs: infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login \
            --name ${{ needs.infra.outputs.acr-name }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ needs.infra.outputs.acr-login-server }}/${{ env.AZURE_APP_NAME }}
          TAG=${GITHUB_SHA::8}

          docker build -t $IMAGE:$TAG -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

          echo "image=$IMAGE:$TAG" >> $GITHUB_ENV
          echo "✅ Image pushed: $IMAGE:$TAG"

      - name: Get ACR credentials
        id: acr-creds
        run: |
          creds=$(az acr credential show \
            --name ${{ needs.infra.outputs.acr-name }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --output json)

          echo "username=$(echo $creds | jq -r '.username')" >> $GITHUB_OUTPUT
          echo "password=$(echo $creds | jq -r '.passwords[0].value')" >> $GITHUB_OUTPUT

      - name: Deploy container instance
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RG }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --name ${{ env.AZURE_APP_NAME }}-ci \
            --image ${{ env.image }} \
            --registry-login-server ${{ needs.infra.outputs.acr-login-server }} \
            --registry-username ${{ steps.acr-creds.outputs.username }} \
            --registry-password "${{ steps.acr-creds.outputs.password }}" \
            --dns-name-label ${{ env.AZURE_APP_NAME }} \
            --ports 8080 \
            --os-type Linux \
            --cpu 1 \
            --memory 1 \
            --environment-variables PORT=8080 \
            --restart-policy Always

          echo "🚀 Container updated with new image"

      - name: Get deployment URL
        id: get-url
        run: |
          fqdn=$(az container show \
            --resource-group ${{ secrets.AZURE_RG }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --name ${{ env.AZURE_APP_NAME }}-ci \
            --query 'ipAddress.fqdn' \
            --output tsv)

          echo "url=http://$fqdn:8080" >> $GITHUB_OUTPUT
          echo "🚀 Deployment complete!"
          echo "🎮 Hockey Pong is live at: http://$fqdn:8080"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎮 **Hockey Pong is now live!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.get-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container:** ${{ env.AZURE_APP_NAME }}-ci" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** East US 2" >> $GITHUB_STEP_SUMMARY
          echo "- **Runtime:** Node.js ${{ env.NODE_VERSION }} (Alpine)" >> $GITHUB_STEP_SUMMARY
          echo "- **WebSockets:** ✅ Native support" >> $GITHUB_STEP_SUMMARY
